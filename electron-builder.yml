appId: com.steammini.app
productName: SteamMini

directories:
  output: dist_electron

files:
  - dist/**/*
  - electron/**/*

extraResources:
  - from: resources
    to: .
  - from: .env
    to: .env

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  # installerIcon: resources/icon.png
  # uninstallerIcon: resources/icon.png
  shortcutName: SteamMini
  createDesktopShortcut: true
  createStartMenuShortcut: true

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png

publish:
  provider: github
  owner: F1x-hub
  repo: SteamMini
  releaseType: release
