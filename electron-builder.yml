appId: com.steammini.app
productName: SteamMini

directories:
  output: dist_electron

files:
  - dist/**/*
  - electron/**/*

extraResources:
  - from: resources
    to: .

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  # installerIcon: assets/icon.ico      # ← раскомментировать когда assets/icon.ico будет создан
  # uninstallerIcon: assets/icon.ico
  shortcutName: SteamMini
  createDesktopShortcut: true
  createStartMenuShortcut: true

win:
  target:
    - target: nsis
      arch: [x64]
  # icon: assets/icon.ico               # ← раскомментировать когда assets/icon.ico будет создан

publish:
  provider: github
  owner: F1x-hub
  repo: SteamMini
  releaseType: release
